name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment:
          - esp32s3dev
          - esp32s2dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio==6.1.18

      - name: Build ${{ matrix.environment }}
        run: pio run -e ${{ matrix.environment }}

  native-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio
          key: ${{ runner.os }}-pio-native-${{ hashFiles('platformio.ini') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio==6.1.18

      - name: Enforce core timing guard
        run: python tools/check_core_timing_guard.py

      - name: Run native tests
        run: pio test -e native

  validate-library:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio==6.1.18

      - name: Check generated version metadata
        run: python scripts/generate_version.py check

      - name: Enforce example CLI contract
        run: python tools/check_cli_contract.py

      - name: Enforce IDF example contract
        run: python tools/check_idf_example_contract.py

      - name: Enforce chip documentation coverage
        run: python tools/check_chip_docs_coverage.py

      - name: Validate library package
        run: |
          pio pkg pack
          python tools/check_package_contract.py

  esp-idf-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - esp32s2
          - esp32s3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build native ESP-IDF example for ${{ matrix.target }}
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.4.0
          target: ${{ matrix.target }}
          path: examples/idf/basic
